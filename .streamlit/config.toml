[theme]
# Bu kod barcha agentlar uchun tizimni yorug' va toza rejimda qulflaydi
base="light"

# Asosiy brend rangimiz (To'q ko'k) - Tugmalar va aktiv elementlar uchun
primaryColor="#0b1f3f"

# Dasturning orqa foni (Professional ochiq kulrang)
backgroundColor="#f4f6f9"

# Kiritish maydonlari (Input/Select) va panellar foni (Toza oq)
secondaryBackgroundColor="#ffffff"

# Barcha matnlar rangi (To'q ko'k, oq fonda aniq o'qiladi)
textColor="#0b1f3f"

# Shrift turi
font="sans serif"
